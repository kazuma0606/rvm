services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: test
      POSTGRES_DB: crucible_test
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crucible_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ./crucible_test_setup.sql:/docker-entrypoint-initdb.d/crucible_test_setup.sql:ro
