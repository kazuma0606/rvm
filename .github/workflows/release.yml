name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: forge-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: forge-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: forge-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: forge-darwin-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64 Linux only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }} --bin forge-new --locked

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} --bin forge-new --locked

      - name: Rename binary (Unix)
        run: |
          cp target/${{ matrix.target }}/release/forge-new ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
          generate_release_notes: true
